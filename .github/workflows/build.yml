name: Build Distributions

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            task: packageDeb
            artifact_path: build/compose/binaries/main/deb
            artifact_name: openLog-linux-x64

          - os: windows-latest
            task: packageMsi
            artifact_path: build/compose/binaries/main/msi
            artifact_name: openLog-windows-x64

          # macOS runner is Apple Silicon (arm64); unsigned (no Apple Developer cert in CI), so
          # Gatekeeper will show an "unidentified developer" warning on first launch — same as
          # a local unsigned build.
          - os: macos-latest
            task: packageDmg
            artifact_path: build/compose/binaries/main/dmg
            artifact_name: openLog-macos-arm64

    runs-on: ${{ matrix.os }}
    # windows-latest defaults `run:` steps to PowerShell, where `chmod`/`./gradlew` don't work.
    # GitHub-hosted Windows runners ship Git Bash, so force bash uniformly across all three OSes.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Package distribution
        run: ./gradlew ${{ matrix.task }}

      # jpackage doesn't emit StartupWMClass in the .desktop file it generates (no Gradle DSL
      # hook for it either), so docks/taskbars can't match the running window (WM_CLASS set to
      # "openLog" via sun.java.command in Main.kt) back to this launcher entry — falls back to
      # a generic icon and the raw class name. Patch it in post-build since the .deb is just an
      # archive. The .desktop file ships at opt/<packageName>/lib/, not usr/share/applications —
      # postinst runs `xdg-desktop-menu install` on it at install time to put it there.
      - name: Add StartupWMClass to Linux .desktop file
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          deb=$(find build/compose/binaries/main/deb -name '*.deb')
          workdir=$(mktemp -d)
          dpkg-deb -R "$deb" "$workdir"
          desktop_file=$(find "$workdir/opt" -maxdepth 3 -type f -name '*.desktop')
          if ! grep -q '^StartupWMClass=' "$desktop_file"; then
            echo "StartupWMClass=openLog" >> "$desktop_file"
          fi
          dpkg-deb -b "$workdir" "$deb"
          rm -rf "$workdir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
