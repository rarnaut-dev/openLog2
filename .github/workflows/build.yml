name: Build Distributions

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            task: packageDeb
            artifact_path: build/compose/binaries/main/deb
            artifact_name: openLog-linux-x64

          - os: windows-latest
            task: packageMsi
            artifact_path: build/compose/binaries/main/msi
            artifact_name: openLog-windows-x64

          # macOS runner is Apple Silicon (arm64); unsigned (no Apple Developer cert in CI), so
          # Gatekeeper will show an "unidentified developer" warning on first launch — same as
          # a local unsigned build.
          - os: macos-latest
            task: packageDmg
            artifact_path: build/compose/binaries/main/dmg
            artifact_name: openLog-macos-arm64

    runs-on: ${{ matrix.os }}
    # windows-latest defaults `run:` steps to PowerShell, where `chmod`/`./gradlew` don't work.
    # GitHub-hosted Windows runners ship Git Bash, so force bash uniformly across all three OSes.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Package distribution
        run: ./gradlew ${{ matrix.task }}

      # jpackage doesn't emit StartupWMClass in the .desktop file it generates (no Gradle DSL
      # hook for it either), so docks/taskbars can't match the running window (WM_CLASS set to
      # "openLog" via sun.java.command in Main.kt) back to this launcher entry — falls back to
      # a generic icon and the raw class name. Patch it in post-build since the .deb is just an
      # archive. The .desktop file ships at opt/<packageName>/lib/, not usr/share/applications —
      # postinst runs `xdg-desktop-menu install` on it at install time to put it there.
      #
      # Also defensively ensure postinst rebuilds the desktop/MIME cache after that install: the
      # fileAssociation() entries in build.gradle.kts land as MimeType= in the generated .desktop
      # file, but file managers resolve "Open With" candidates from the cached
      # /usr/share/applications/mimeinfo.cache, which is only rebuilt by update-desktop-database.
      # xdg-desktop-menu install may already trigger this internally on most distros, but jpackage
      # gives no guarantee of it (same class of gap as StartupWMClass above), so append an
      # idempotent call as a safety net rather than relying on unverified distro behavior.
      #
      # Three further defects in the same generated artifacts, per the Desktop Entry Spec
      # (https://specifications.freedesktop.org/desktop-entry/latest/exec-variables.html): an
      # entry that declares MimeType must carry a field code in Exec or it can never receive a
      # file at all — jpackage emits Exec with none, so "Open With openLog" silently no-ops.
      # Append %F (not %f: Main.kt/AppState.openPaths takes a List<File>, and the single-instance
      # handoff wants to forward every path from one launch in one shot). Second, jpackage repeats
      # MimeType=text/plain once per fileAssociation() call — dedupe preserving first-seen order.
      # Third, replace the generated MimeInfo XML (duplicate text/plain blocks, each overriding
      # the system's own <comment>) with the hand-authored packaging/linux/openlog-mimeinfo.xml,
      # which only declares globs for extensions the system doesn't already type.
      - name: Add StartupWMClass and desktop-database refresh to Linux .desktop/postinst
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          deb=$(find build/compose/binaries/main/deb -name '*.deb')
          workdir=$(mktemp -d)
          dpkg-deb -R "$deb" "$workdir"
          desktop_file=$(find "$workdir/opt" -maxdepth 3 -type f -name '*.desktop')
          if ! grep -q '^StartupWMClass=' "$desktop_file"; then
            echo "StartupWMClass=openLog" >> "$desktop_file"
          fi
          postinst="$workdir/DEBIAN/postinst"
          if [ -f "$postinst" ] && ! grep -q 'update-desktop-database' "$postinst"; then
            echo 'update-desktop-database -q /usr/share/applications 2>/dev/null || true' >> "$postinst"
          fi
          if ! grep -q '^Exec=.* %F$' "$desktop_file"; then
            sed -i 's|^\(Exec=.*\)$|\1 %F|' "$desktop_file"
          fi
          mime_line=$(grep '^MimeType=' "$desktop_file" || true)
          if [ -n "$mime_line" ]; then
            deduped=$(echo "${mime_line#MimeType=}" | tr ';' '\n' | awk 'NF && !seen[$0]++' | tr '\n' ';')
            sed -i "s|^MimeType=.*|MimeType=${deduped}|" "$desktop_file"
          fi
          # jpackage renders Categories= from menuGroup with no trailing separator, but the spec
          # types it as a list, and desktop-file-validate rejects a list key without one — that
          # would fail the gate below on an otherwise correct entry.
          if grep -q '^Categories=[^;]*$' "$desktop_file"; then
            sed -i 's|^\(Categories=.*\)$|\1;|' "$desktop_file"
          fi
          mimeinfo_file=$(find "$workdir/opt" -name '*-MimeInfo.xml')
          if [ -n "$mimeinfo_file" ]; then
            cp packaging/linux/openlog-mimeinfo.xml "$mimeinfo_file"
          fi
          dpkg-deb -b "$workdir" "$deb"
          rm -rf "$workdir"

      # desktop-file-validate is exactly the tool that flags "declares MimeType but Exec takes no
      # arguments" — this gate would have caught the original %F-less Exec regressing silently.
      - name: Validate generated .desktop entry
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y desktop-file-utils
          deb=$(find build/compose/binaries/main/deb -name '*.deb')
          workdir=$(mktemp -d)
          dpkg-deb -R "$deb" "$workdir"
          desktop_file=$(find "$workdir/opt" -maxdepth 3 -type f -name '*.desktop')
          desktop-file-validate "$desktop_file"
          grep -q '^Exec=.* %F$' "$desktop_file"
          rm -rf "$workdir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
