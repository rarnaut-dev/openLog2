// ─── Helpers ───────────────────────────────────────────────────
function mkFilter(){
  return{levels:new Set(['V','D','I','W','E','A']),activeTags:new Set(),kwText:'',kwRegex:false,highlighters:[],seqOn:true};
}
function mkRmap(data){const m={};data.forEach(r=>m[r.id]=r);return m;}
function mkTab(id,fn,data,seqs){
  return{id,filename:fn,logData:data,seqGroups:seqs,rmap:mkRmap(data),
    filter:mkFilter(),showUnfiltered:false,expanded:new Set(),selected:new Set(),
    annotations:{entries:[],prefix:'## '+fn,suffix:''},showAnnMd:false};
}
function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k)||'null')??d;}catch(e){return d;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ─── Component ─────────────────────────────────────────────────
class Component extends DCLogic{
  state={
    tabs:[mkTab('a','login_crash.log',LOG_A,SEQ_A),mkTab('b','boot_seq.log',LOG_B,SEQ_B)],
    activeTabId:'a',
    compareMode:false,
    compareTabId:'b',
    savedFilters:lsGet('ol_sf',[]),
    tagUsage:lsGet('ol_tu',{}),
    ctx:null,
    sfDialog:false,sfName:'',sfTabId:null,
    newHlPat:'',newHlRx:false,newHlColor:HL_COLORS[0],
    nextN:3,
  };

  componentDidMount(){
    document.addEventListener('keydown',this._ky=e=>{
      if(e.key==='Escape')this.setState({ctx:null,sfDialog:false});
    });
  }
  componentWillUnmount(){document.removeEventListener('keydown',this._ky);}

  // Tab helpers
  gTab(id){return this.state.tabs.find(t=>t.id===id);}
  aTab(){return this.gTab(this.state.activeTabId);}
  upTab(tabId,fn){this.setState(s=>({tabs:s.tabs.map(t=>t.id===tabId?{...t,...fn(t)}:t)}));}
  upFlt(tabId,fn){this.upTab(tabId,t=>({filter:{...t.filter,...fn(t.filter)}}))}

  // Filter ops
  toggleLevel(tabId,lvl){
    this.upFlt(tabId,f=>{const n=new Set(f.levels);n.has(lvl)?n.delete(lvl):n.add(lvl);return{levels:n};});
  }
  toggleTag(tabId,tag){
    this.upFlt(tabId,f=>{const n=new Set(f.activeTags);n.has(tag)?n.delete(tag):n.add(tag);return{activeTags:n};});
    this.setState(s=>{const tu={...s.tagUsage,[tag]:(s.tagUsage[tag]||0)+1};lsSave('ol_tu',tu);return{tagUsage:tu};});
  }
  setKw(tabId,v){this.upFlt(tabId,()=>({kwText:v}));}
  toggleKwRx(tabId){this.upFlt(tabId,f=>({kwRegex:!f.kwRegex}));}
  clearTags(tabId){this.upFlt(tabId,()=>({activeTags:new Set()}));}
  toggleSeq(tabId){this.upFlt(tabId,f=>({seqOn:!f.seqOn}));}
  clearFilter(tabId){this.upFlt(tabId,()=>mkFilter());}

  // Highlighters
  addHl(tabId,pat,rx,color){
    if(!pat)return;
    this.upFlt(tabId,f=>({highlighters:[...f.highlighters,{id:'hl'+Date.now(),pattern:pat,regex:rx,color,on:true}]}));
    this.setState({newHlPat:''});
  }
  removeHl(tabId,id){this.upFlt(tabId,f=>({highlighters:f.highlighters.filter(h=>h.id!==id)}));}
  toggleHl(tabId,id){this.upFlt(tabId,f=>({highlighters:f.highlighters.map(h=>h.id===id?{...h,on:!h.on}:h)}));}

  // Saved filters
  saveFilter(tabId,name){
    const tab=this.gTab(tabId);if(!tab)return;
    const f=tab.filter;
    const sf={id:'sf'+Date.now(),name,levels:[...f.levels],activeTags:[...f.activeTags],
      kwText:f.kwText,kwRegex:f.kwRegex,highlighters:f.highlighters,seqOn:f.seqOn};
    this.setState(s=>{const n=[...s.savedFilters,sf];lsSave('ol_sf',n);return{savedFilters:n,sfDialog:false,sfName:''};});
  }
  loadFilter(tabId,sf){
    this.upFlt(tabId,()=>({levels:new Set(sf.levels),activeTags:new Set(sf.activeTags||[]),
      kwText:sf.kwText||'',kwRegex:!!sf.kwRegex,highlighters:sf.highlighters||[],seqOn:sf.seqOn!==false}));
  }
  delSF(id){this.setState(s=>{const n=s.savedFilters.filter(f=>f.id!==id);lsSave('ol_sf',n);return{savedFilters:n};});}

  // Row filtering
  passes(row,filter){
    if(!filter.levels.has(row.level))return false;
    if(filter.activeTags.size>0&&!filter.activeTags.has(row.tag))return false;
    if(filter.kwText){
      try{
        const hay=row.tag+' '+row.msg;
        if(filter.kwRegex){if(!new RegExp(filter.kwText,'i').test(hay))return false;}
        else{if(!hay.toLowerCase().includes(filter.kwText.toLowerCase()))return false;}
      }catch(e){}
    }
    return true;
  }

  // Compute items (with sequence grouping)
  computeItems(tab,applyFilter){
    const{filter,seqGroups,rmap,expanded}=tab;
    const pass=r=>!applyFilter||this.passes(r,filter);
    const useSeqs=applyFilter&&filter.seqOn&&seqGroups&&seqGroups.length>0;
    if(!useSeqs)return tab.logData.filter(r=>pass(r)).map(r=>({t:'row',r,ind:0,key:'r'+r.id}));

    const skipIds=new Set();
    seqGroups.forEach(g=>{g.plain.forEach(id=>skipIds.add(id));g.nested.forEach(ng=>{skipIds.add(ng.rid);ng.ch.forEach(id=>skipIds.add(id));});});

    const items=[];
    for(const r of tab.logData){
      const sg=seqGroups.find(g=>g.rid===r.id);
      if(sg){
        if(!pass(r))continue;
        const allCh=[...sg.plain,...sg.nested.flatMap(ng=>[ng.rid,...ng.ch])];
        const vc=allCh.filter(id=>{const cr=rmap[id];return cr&&pass(cr);}).length;
        const exp=expanded.has(sg.gid);
        items.push({t:'sh',r,ind:0,gid:sg.gid,exp,cnt:vc,sc:S1,key:'sg'+sg.gid});
        if(exp){
          sg.plain.forEach(id=>{const cr=rmap[id];if(cr&&pass(cr))items.push({t:'row',r:cr,ind:1,key:'r'+id});});
          for(const ng of sg.nested){
            const nr=rmap[ng.rid];if(!nr||!pass(nr))continue;
            const nvc=ng.ch.filter(id=>{const cr=rmap[id];return cr&&pass(cr);}).length;
            const nexp=expanded.has(ng.gid);
            items.push({t:'sh',r:nr,ind:1,gid:ng.gid,exp:nexp,cnt:nvc,sc:S2,key:'nsg'+ng.gid});
            if(nexp)ng.ch.forEach(id=>{const cr=rmap[id];if(cr&&pass(cr))items.push({t:'row',r:cr,ind:2,key:'r'+id});});
          }
        }
        continue;
      }
      if(skipIds.has(r.id))continue;
      if(pass(r))items.push({t:'row',r,ind:0,key:'r'+r.id});
    }
    return items;
  }

  // Text highlighting
  applyHl(text,hls){
    const active=(hls||[]).filter(h=>h.on&&h.pattern);
    if(!active.length)return text;
    let segs=[{text,hl:null}];
    for(const hl of active){
      let re;
      try{re=new RegExp(hl.regex?hl.pattern:hl.pattern.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');}catch(e){continue;}
      const ns=[];
      for(const seg of segs){
        if(seg.hl){ns.push(seg);continue;}
        let last=0,m;re.lastIndex=0;
        while((m=re.exec(seg.text))!==null){
          if(m.index>last)ns.push({text:seg.text.slice(last,m.index),hl:null});
          ns.push({text:m[0],hl:hl.color});
          last=m.index+m[0].length;
          if(m[0].length===0){re.lastIndex++;break;}
        }
        if(last<seg.text.length)ns.push({text:seg.text.slice(last),hl:null});
      }
      segs=ns;
    }
    if(segs.length===1&&!segs[0].hl)return text;
    return segs.map((s,i)=>s.hl
      ?React.createElement('mark',{key:i,style:{background:s.hl+'cc',color:'#0d1117',borderRadius:2,padding:'0 1px'}},s.text)
      :s.text);
  }

  // Row interactions
  selRow(tabId,id,e){
    this.upTab(tabId,t=>{
      const n=new Set(t.selected);
      if(e.ctrlKey||e.metaKey){n.has(id)?n.delete(id):n.add(id);}
      else if(e.shiftKey){n.add(id);}
      else{if(n.size===1&&n.has(id))n.clear();else{n.clear();n.add(id);}}
      return{selected:n};
    });
  }
  toggleG(tabId,gid){this.upTab(tabId,t=>{const n=new Set(t.expanded);n.has(gid)?n.delete(gid):n.add(gid);return{expanded:n};});}
  openCtx(tabId,id,e){
    e.preventDefault();
    const selText=(window.getSelection()||{toString:()=>''}).toString().trim();
    this.setState({ctx:{tabId,id,x:e.clientX,y:e.clientY,selText}});
  }
  closeCtx(){this.setState({ctx:null});}
  addAnn(tabId,id){
    this.upTab(tabId,t=>{
      if(t.annotations.entries.find(a=>a.logId===id))return{};
      const entries=[...t.annotations.entries,{id:'a'+Date.now(),logId:id,note:''}].sort((a,b)=>a.logId-b.logId);
      return{annotations:{...t.annotations,entries}};
    });
    this.setState({ctx:null});
  }
  updNote(tabId,annId,note){this.upTab(tabId,t=>({annotations:{...t.annotations,entries:t.annotations.entries.map(e=>e.id===annId?{...e,note}:e)}}));}
  rmAnn(tabId,annId){this.upTab(tabId,t=>({annotations:{...t.annotations,entries:t.annotations.entries.filter(e=>e.id!==annId)}}));}

  // Tab management
  addTab(){
    const n=this.state.nextN;
    const tab=mkTab('t'+n,'sample_'+n+'.log',LOG_A.slice(0,20),[]);
    this.setState(s=>({tabs:[...s.tabs,tab],activeTabId:tab.id,nextN:n+1}));
  }
  closeTab(tabId,e){
    e.stopPropagation();
    this.setState(s=>{
      const tabs=s.tabs.filter(t=>t.id!==tabId);
      if(!tabs.length)return{tabs,activeTabId:null};
      const activeTabId=s.activeTabId===tabId?tabs[tabs.length-1].id:s.activeTabId;
      const compareTabId=s.compareTabId===tabId?tabs[0].id:s.compareTabId;
      return{tabs,activeTabId,compareTabId};
    });
  }

  // ─── Render: badge ──────────────────────────────────────────
  bdg(lvl){
    const c=lvlColor(lvl);
    return React.createElement('span',{style:{background:c+'22',color:c,border:'1px solid '+c+'44',borderRadius:3,padding:'0 5px',fontSize:11,fontFamily:MN,fontWeight:600,flexShrink:0}},lvl);
  }

  // ─── Render: column header ──────────────────────────────────
  colHdr(){
    return React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'4px 12px',background:P2,borderBottom:'1px solid '+BR,flexShrink:0}},[
      React.createElement('span',{key:'ts',style:{color:TD,fontSize:10,fontFamily:MN,width:112,flexShrink:0,letterSpacing:'.05em'}},'TIMESTAMP'),
      React.createElement('span',{key:'lv',style:{color:TD,fontSize:10,fontFamily:MN,width:34,flexShrink:0,letterSpacing:'.05em'}},'LVL'),
      React.createElement('span',{key:'tg',style:{color:TD,fontSize:10,fontFamily:MN,width:148,flexShrink:0,letterSpacing:'.05em'}},'TAG'),
      React.createElement('span',{key:'mg',style:{color:TD,fontSize:10,fontFamily:MN,flex:1,letterSpacing:'.05em'}},'MESSAGE'),
    ]);
  }

  // ─── Render: log row ────────────────────────────────────────
  rowEl(tab,item){
    const{r,ind}=item;
    const isSel=tab.selected.has(r.id);
    const isAnn=tab.annotations.entries.some(a=>a.logId===r.id);
    const bg=isSel?SL:'transparent';
    return React.createElement('div',{key:item.key,
      onClick:e=>this.selRow(tab.id,r.id,e),
      onContextMenu:e=>this.openCtx(tab.id,r.id,e),
      style:{display:'flex',alignItems:'center',gap:8,padding:`2px 12px 2px ${12+ind*18}px`,cursor:'pointer',background:bg,minHeight:24,userSelect:'none',borderLeft:isAnn?'2px solid '+AC:'2px solid transparent'},
      onMouseEnter:e=>{if(!isSel)e.currentTarget.style.background=HV;},
      onMouseLeave:e=>{if(!isSel)e.currentTarget.style.background=bg;},
    },[
      React.createElement('span',{key:'ts',style:{color:TD,fontSize:12,fontFamily:MN,flexShrink:0,width:112}},r.ts),
      this.bdg(r.level),
      React.createElement('span',{key:'tg',style:{color:TS,fontSize:12,fontFamily:MN,flexShrink:0,width:148,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},r.tag+':'),
      React.createElement('span',{key:'mg',style:{color:TX,fontSize:12,fontFamily:MN,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',userSelect:'text'}},this.applyHl(r.msg,tab.filter.highlighters)),
      isAnn?React.createElement('span',{key:'an',style:{color:AC,fontSize:10,flexShrink:0,marginLeft:4}},'◆'):null,
    ].filter(Boolean));
  }

  // ─── Render: sequence header ────────────────────────────────
  shEl(tab,item){
    const{r,sc,exp,cnt,gid,ind}=item;
    const bg=sc+'11';
    return React.createElement('div',{key:item.key,
      onClick:()=>this.toggleG(tab.id,gid),
      style:{display:'flex',alignItems:'center',gap:8,padding:`3px 12px 3px ${12+ind*18}px`,cursor:'pointer',background:bg,borderLeft:'3px solid '+sc,minHeight:26,userSelect:'none'},
      onMouseEnter:e=>{e.currentTarget.style.background=sc+'22';},
      onMouseLeave:e=>{e.currentTarget.style.background=bg;},
    },[
      React.createElement('span',{key:'ic',style:{color:sc,fontSize:9,width:12,flexShrink:0,fontFamily:MN}},exp?'▼':'▶'),
      React.createElement('span',{key:'ts',style:{color:TD,fontSize:12,fontFamily:MN,flexShrink:0,width:112}},r.ts),
      this.bdg(r.level),
      React.createElement('span',{key:'tg',style:{color:sc,fontSize:12,fontFamily:MN,flexShrink:0,width:148,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},r.tag+':'),

    ]);
  }

  // ─── Render: compare view ────────────────────────────────────
  compareView(){
    const{tabs,activeTabId,compareTabId}=this.state;
    const tabA=this.gTab(activeTabId)||tabs[0];
    const tabB=this.gTab(compareTabId)||(tabs[1]||tabs[0]);

    const picker=(curId,onChange)=>React.createElement('div',{style:{display:'flex',alignItems:'center',gap:4,padding:'4px 10px',background:P2,borderBottom:'1px solid '+BR,flexShrink:0}},
      tabs.map(t=>React.createElement('span',{key:t.id,onClick:()=>onChange(t.id),
        style:{background:t.id===curId?ABG:'transparent',border:'1px solid '+(t.id===curId?AC:BR),color:t.id===curId?AC:TS,borderRadius:4,padding:'2px 8px',fontSize:11,fontFamily:MN,cursor:'pointer',whiteSpace:'nowrap'}}
        ,t.filename)));

    return React.createElement('div',{style:{flex:1,display:'flex',overflow:'hidden'}},[
      React.createElement('div',{key:'left',style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',borderRight:'2px solid '+BR+'88'}},[
        picker(tabA.id,id=>this.setState({activeTabId:id})),
        React.createElement('div',{key:'v',style:{flex:1,display:'flex',overflow:'hidden'}},[
          this.filterPanel(tabA),
          this.logViewer(tabA),
        ]),
      ]),
      React.createElement('div',{key:'right',style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},[
        picker(tabB.id,id=>this.setState({compareTabId:id})),
        React.createElement('div',{key:'v',style:{flex:1,display:'flex',overflow:'hidden'}},[
          this.filterPanel(tabB),
          this.logViewer(tabB),
          this.annPanel(tabB),
        ]),
      ]),
    ]);
  }

  // ─── Render: context menu ────────────────────────────────────
  ctxEl(){
    const{ctx}=this.state;if(!ctx)return null;
    const tab=this.gTab(ctx.tabId);if(!tab)return null;
    const r=tab.rmap[ctx.id];if(!r)return null;

    const items=[
      {lbl:'Add to annotation',ic:'◆',fn:()=>this.addAnn(ctx.tabId,ctx.id)},
      ctx.selText?{lbl:`Highlight "${ctx.selText.slice(0,24)}"`,ic:'▐',fn:()=>{this.addHl(ctx.tabId,ctx.selText,false,this.state.newHlColor);this.setState({ctx:null});}}:null,
      null,
      {lbl:'Copy line',ic:'⎘',fn:()=>{navigator.clipboard.writeText(`${r.ts}  ${r.level}/${r.tag}: ${r.msg}`).catch(()=>{});this.setState({ctx:null});}},
      {lbl:'Copy as Markdown',ic:'M↓',fn:()=>{navigator.clipboard.writeText(`**[${r.ts}] \`${r.level}/${r.tag}\`:** ${r.msg}`).catch(()=>{});this.setState({ctx:null});}},
    ].filter(x=>x!==undefined);

    const maxX=window.innerWidth-240,maxY=window.innerHeight-200;
    return React.createElement('div',{
      style:{position:'fixed',top:Math.min(ctx.y,maxY),left:Math.min(ctx.x,maxX),background:'#24272e',border:'1px solid #383d45',borderRadius:7,boxShadow:'0 8px 32px rgba(0,0,0,.75)',zIndex:9999,overflow:'hidden',minWidth:230},
      onClick:e=>e.stopPropagation()
    },[
      React.createElement('div',{key:'hd',style:{padding:'8px 12px',borderBottom:'1px solid '+BR}},[
        React.createElement('div',{key:'tg',style:{fontSize:10,color:TD,fontFamily:MN,marginBottom:2}},r.tag),
        React.createElement('div',{key:'mg',style:{fontSize:11,color:TX,fontFamily:MN,maxWidth:240,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},r.msg),
      ]),
      ...items.map((it,i)=>{
        if(!it)return React.createElement('div',{key:'d'+i,style:{height:1,background:BR}});
        return React.createElement('div',{key:it.lbl,onClick:it.fn,
          style:{display:'flex',alignItems:'center',gap:10,padding:'7px 14px',cursor:'pointer',fontSize:12,fontFamily:UI,color:TX},
          onMouseEnter:e=>e.currentTarget.style.background=HV,
          onMouseLeave:e=>e.currentTarget.style.background='transparent',
        },[
          React.createElement('span',{key:'ic',style:{color:TD,width:20,fontSize:11,fontFamily:MN,flexShrink:0}},it.ic),
          it.lbl,
        ]);
      }),
    ]);
  }

  // ─── Render: save filter dialog ──────────────────────────────
  sfDialogEl(){
    const{sfDialog,sfName,sfTabId}=this.state;
    if(!sfDialog)return null;
    return React.createElement('div',{
      style:{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:10000,display:'flex',alignItems:'center',justifyContent:'center'},
      onClick:()=>this.setState({sfDialog:false})
    },[
      React.createElement('div',{key:'d',onClick:e=>e.stopPropagation(),
        style:{background:'#24272e',border:'1px solid '+BR,borderRadius:8,padding:20,width:340,boxShadow:'0 16px 48px rgba(0,0,0,.8)'}},[
        React.createElement('div',{key:'t',style:{fontSize:14,fontWeight:600,color:TX,fontFamily:UI,marginBottom:5}},'Save filter preset'),
        React.createElement('div',{key:'s',style:{fontSize:11,color:TD,fontFamily:UI,marginBottom:14,lineHeight:1.5}},'Saves: log levels · active tag filters · keyword · regex mode · highlighters · sequence grouping'),
        React.createElement('input',{key:'i',type:'text',placeholder:'Preset name…',value:sfName,
          onChange:e=>this.setState({sfName:e.target.value}),
          onKeyDown:e=>{if(e.key==='Enter'&&sfName)this.saveFilter(sfTabId,sfName);},
          autoFocus:true,
          style:{width:'100%',background:P2,border:'1px solid '+BR,borderRadius:4,padding:'8px 12px',color:TX,fontSize:13,fontFamily:UI,outline:'none',boxSizing:'border-box',marginBottom:12}}),
        React.createElement('div',{key:'btns',style:{display:'flex',gap:8}},[
          React.createElement('button',{key:'sv',onClick:()=>{if(sfName)this.saveFilter(sfTabId,sfName);},
            style:{flex:1,background:sfName?ABG:'transparent',border:'1px solid '+(sfName?AC:BR),color:sfName?AC:TS,borderRadius:4,padding:'7px',fontSize:12,fontFamily:UI,cursor:sfName?'pointer':'default'}},'Save'),
          React.createElement('button',{key:'cn',onClick:()=>this.setState({sfDialog:false}),
            style:{flex:1,background:'transparent',border:'1px solid '+BR,color:TS,borderRadius:4,padding:'7px',fontSize:12,fontFamily:UI,cursor:'pointer'}},'Cancel'),
        ]),
      ]),
    ]);
  }

  // ─── renderVals ──────────────────────────────────────────────
  renderVals(){
    const{activeTabId,compareMode,tabs}=this.state;
    const tab=this.gTab(activeTabId)||tabs[0];

    const mainContent=tabs.length===0
      ?React.createElement('div',{style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}},[
          React.createElement('div',{style:{color:TS,fontSize:14,fontFamily:UI}},'No files open — click + to add a log'),
        ])
      :React.createElement('div',{style:{flex:1,display:'flex',overflow:'hidden'}},
          compareMode?[this.compareView()]:[tab?this.fileView(tab):null]);

    return{
      tabBar:this.renderTabBar(),
      mainContent,
      ctxMenu:this.ctxEl(),
      sfDialog:this.sfDialogEl(),
      globalClick:()=>{if(this.state.ctx)this.closeCtx();},
    };
  }
}

</script>
</body>
</html>
