# Compose Desktop blocks Homebrew JDK packaging by default. This keeps local
# package smoke tests runnable; release builds should use a production JDK.
compose.desktop.packaging.checkJdkVendor=false
app.version=1.5.1

# SettingsDialog.kt's single SettingsDialog() composable is large enough that the Compose
# compiler's IR-to-bytecode transform runs the Kotlin daemon out of its default heap
# ("GC overhead limit exceeded" during codegen). Give the daemon more room.
kotlin.daemon.jvmargs=-Xmx4096m
